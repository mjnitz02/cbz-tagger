---
name: Auto Bump Version on PR
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
permissions:
  contents: write
jobs:
  auto-bump-version:
    name: Auto Bump Patch Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Check and bump version
        run: |-
          # Skip bump if pyproject.toml was manually changed in this PR
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^pyproject.toml$'; then
            echo "pyproject.toml already modified in this PR. Nothing to do."
            exit 0
          fi

          # Get the version from main to compute the new version
          MAIN_VERSION=$(git show origin/${{ github.base_ref }}:pyproject.toml | grep -E '^version = ' | sed 's/version = "//' | sed 's/"//')

          # Bump the patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$MAIN_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping version from $MAIN_VERSION to $NEW_VERSION"

          # Update pyproject.toml
          sed -i "s/^version = \"${MAIN_VERSION}\"/version = \"${NEW_VERSION}\"/" pyproject.toml

          # Update uv.lock (cbz-tagger package entry)
          sed -i '/^\[\[package\]\]/{N;N;s/name = "cbz-tagger"\nversion = "'"${MAIN_VERSION}"'"/name = "cbz-tagger"\nversion = "'"${NEW_VERSION}"'"/}' uv.lock

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "Bump version"
          git push
